# generated by PrusaSlicer 2.9.5 on a mini vendor bundle for tests
[printer_model:COREONE]
name = Prusa CORE One && CORE One+

[printer_model:COREONEL]
name = Prusa CORE One L

[printer_model:MK4S]
name = Original Prusa MK4S

[filament:*common*]
filament_diameter = 1.75
filament_cooling_moves = 4
cooling = 1

[filament:*PLA*]
inherits = *common*
bed_temperature = 60
filament_type = PLA
temperature = 210
filament_max_volumetric_speed = 15

[filament:Prusament PLA]
inherits = *PLA*
temperature = 215
filament_vendor = Prusa Polymers

[filament:*PLAFAST*]
min_fan_speed = 70
max_fan_speed = 100
compatible_printers_condition = printer_model=~/(MK4S|MK4SMMU3)/ and nozzle_diameter[0]==0.6

[filament:Prusament PLA @MK4S]
inherits = Prusament PLA; *PLAFAST*

[filament:Generic ABS @COREONE HF0.6]
inherits = *PLA*
filament_type = ABS
temperature = 255
compatible_printers_condition = printer_model=~/(COREONE|COREONEL)/ and nozzle_diameter[0]==0.6 and nozzle_high_flow[0]

[filament:Orphan PETG]
inherits = *MISSINGBASE*
filament_type = PETG
temperature = 240

[filament:Prusament PETG @Universal]
inherits = *common*
filament_type = PETG
temperature = 240
compatible_printers_condition = printer_model!="MK3.5"
