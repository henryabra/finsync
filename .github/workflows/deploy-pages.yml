name: Deploy web UI to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege needed to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; let an in-flight run finish (don't cancel deploys).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -w @finsync/web
        # Optional analytics — set these as repo Variables to enable. Unset =
        # empty = analytics disabled (no script, nothing sent). See
        # packages/web/.env.example.
        env:
          VITE_ANALYTICS_SRC: ${{ vars.ANALYTICS_SRC }}
          VITE_ANALYTICS_WEBSITE_ID: ${{ vars.ANALYTICS_WEBSITE_ID }}
          VITE_ANALYTICS_DOMAIN: ${{ vars.ANALYTICS_DOMAIN }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
